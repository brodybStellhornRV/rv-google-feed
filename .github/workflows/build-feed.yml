# .github/workflows/build-feed.yml
# Runs once a day: fetches the RV One feed, rebuilds the Google feed,
# and commits the result so GitHub Pages can serve it.
# You can also run it on demand from the Actions tab ("Run workflow").

name: Build Google vehicle feed

on:
  schedule:
    - cron: "0 9 * * *" # 09:00 UTC daily (~4-5 AM Eastern). Adjust if you like.
  workflow_dispatch: {} # adds a manual "Run workflow" button

permissions:
  contents: write # allows the job to commit the updated feed

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Stored as an encrypted repo secret (Settings → Secrets and variables →
      # Actions). Never hard-code the URL here — it contains an access token.
      FEED_URL: ${{ secrets.FEED_URL }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Fetch the RV One inventory ONCE and reuse it for every feed below.
      # (Fetching per-script tripped RV One's rate limit -> 429 Too Many Requests.)
      - name: Download the RV One inventory once
        run: curl -sSL --retry 3 --retry-delay 5 --fail "$FEED_URL" -o source.xml

      - name: Build the vehicle feed (RVs / campers)
        run: node transform.mjs source.xml

      - name: Build the golf cart feed (Shopping products)
        run: node golf-carts.mjs source.xml

      - name: Build the golf cart local inventory feed (for the GBP)
        run: node golf-carts-local.mjs source.xml

      - name: Commit the updated feeds
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add google-feed.xml google-carts-feed.xml google-carts-local.txt
          if git diff --staged --quiet; then
            echo "No changes to the feeds."
          else
            git commit -m "Update Google feeds ($(date -u +%Y-%m-%d))"
            git push
          fi
